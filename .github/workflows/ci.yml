name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run backend tests
        run: python -m pytest backend/tests/ tests/ -q

      - name: Run Alembic migrations (SQLite test DB)
        run: python -m alembic upgrade head

      - name: Run production-mode smoke stub
        run: python scripts/packaging/smoke_ci.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Lint frontend
        run: |
          if npm run lint --prefix frontend; then
            echo "lint passed"
          else
            echo "lint script missing or failed; skipping"
          fi

      - name: Build frontend
        run: npm run build --prefix frontend

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run secret scanner
        run: python scripts/secret_scan.py --fail

      - name: Run SAST scanner
        run: python scripts/sast_scan.py --output bandit-report.json

      - name: Run vulnerability scanner
        run: python scripts/vuln_scan.py --output vuln-report.json

      - name: Generate SBOM
        run: python scripts/sbom_generate.py --output shared/sbom/taxflow-pro-sbom.json
