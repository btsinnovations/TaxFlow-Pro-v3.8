repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1000]

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3
        args: [--check]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  - repo: local
    hooks:
      - id: secret-scan
        name: Secret scan (offline)
        entry: python scripts/secret_scan.py --fail
        language: python
        pass_filenames: false
        always_run: true

      - id: sast-scan
        name: SAST scan (Bandit high/critical)
        entry: python scripts/sast_scan.py --output bandit-report.json
        language: python
        pass_filenames: false
        always_run: true

      - id: vuln-scan
        name: Vulnerability scan (pip-audit + fallback)
        entry: python scripts/vuln_scan.py --output vuln-report.json
        language: python
        pass_filenames: false
        always_run: true

      - id: lockfile-fresh
        name: Check requirements-lock.txt is up to date
        entry: python scripts/check_lockfile_fresh.py
        language: python
        pass_filenames: false
        always_run: true

      - id: yaml-safe-scan
        name: Check no unsafe yaml.load calls
        entry: python -m pytest backend/tests/test_yaml_safety.py -q
        language: python
        pass_filenames: false
        always_run: true

      - id: frontend-build
        name: Frontend build
        entry: npm run build --prefix frontend
        language: node
        pass_filenames: false
        always_run: true
