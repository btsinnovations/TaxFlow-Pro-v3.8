rules:
  # ---------- Banking & Cash ----------
  - pattern: '(?i)(atm withdrawal|cash withdrawal|cash wd|atm cash)'
    category: 'Cash:Withdrawal'
    priority: 95
  - pattern: '(?i)(atm deposit|cash deposit|branch deposit)'
    category: 'Cash:Deposit'
    priority: 95
  - pattern: '(?i)(check #|check payment|draft check)'
    category: 'Banking:Check'
    priority: 90
  - pattern: '(?i)(wire transfer|domestic wire|international wire|swift)'
    category: 'Transfer:Wire'
    priority: 90

  # ---------- Income Sources ----------
  - pattern: '(?i)(social security|ssa treas|ssi payment)'
    category: 'Income:Government Benefits'
    priority: 100
  - pattern: '(?i)(unemployment|state unemployment|ui benefit)'
    category: 'Income:Unemployment'
    priority: 100
  - pattern: '(?i)(veterans affairs|va benefit)'
    category: 'Income:Veteran Benefits'
    priority: 100
  - pattern: '(?i)(irs|us treasury|tax refund)'
    category: 'Income:Tax Refund'
    priority: 100
  - pattern: '(?i)(payroll|direct deposit|salary|wages)'
    category: 'Income:Salary'
    priority: 95
  - pattern: '(?i)(cash app.*cash out|venmo.*cashout|zelle credit|paypal.*transfer)'
    category: 'Income:P2P Received'
    priority: 96
  - pattern: '(?i)(alimony)'
    category: 'Income:Alimony'
    priority: 95
  - pattern: '(?i)(rental income|tenant payment)'
    category: 'Income:Rental'
    priority: 95
  - pattern: '(?i)(dividend|interest|capital gain|distribution)'
    category: 'Income:Investment'
    priority: 95
  - pattern: '(?i)(stripe|square|upwork|fiverr|patreon)'
    category: 'Income:Gig/Freelance'
    priority: 90
  - pattern: '(?i)(refund|reimbursement|rebate)'
    category: 'Income:Refund'
    priority: 85

  # ---------- Credit Cards & Loans ----------
  - pattern: '(?i)(credit card payment|visa payment|mastercard payment|amex payment|discover payment)'
    category: 'Debt:Credit Card Payment'
    priority: 100
  - pattern: '(?i)(mortgage payment|rocket mortgage|guild mortgage|freedom mortgage)'
    category: 'Bills:Mortgage'
    priority: 100
  - pattern: '(?i)(loan payment|auto loan|personal loan|lendingclub|sofi|upstart)'
    category: 'Debt:Loan Payment'
    priority: 95
  - pattern: '(?i)(student loan|navient|nelnet|mohela|sallie mae|aidvantage)'
    category: 'Debt:Student Loan'
    priority: 95

  # ---------- Investments & Crypto ----------
  - pattern: '(?i)(fidelity|vanguard|charles schwab|etrade|e\*trade|robinhood|interactive brokers)'
    category: 'Investment:Contribution'
    priority: 95
  - pattern: '(?i)(401k|403b|roth ira|traditional ira|retirement contribution)'
    category: 'Investment:Retirement'
    priority: 95
  - pattern: '(?i)(coinbase|kraken|binance|gemini|crypto\.com)'
    category: 'Investment:Cryptocurrency'
    priority: 95
  - pattern: '(?i)(brokerage transfer|investment transfer|securities purchase)'
    category: 'Investment:Transfer'
    priority: 90

  # ---------- Bills & Utilities ----------
  - pattern: '(?i)(electric|power|edison|duke|georgia power|con ed)'
    category: 'Bills:Electricity'
    priority: 100
  - pattern: '(?i)(water|sewer|waste|trash|sanitation|utility bill)'
    category: 'Bills:Water/Sewer'
    priority: 100
  - pattern: '(?i)(gas|natural gas|heating)'
    category: 'Bills:Gas'
    priority: 100
  - pattern: '(?i)(internet|broadband|wi[- ]?fi|spectrum|comcast|xfinity|at[&t]?.*(internet|fiber|u-verse))'
    category: 'Bills:Internet'
    priority: 100
  - pattern: '(?i)(phone|mobile|verizon|t[- ]?mobile|sprint|at[&t]?.*(wireless|mobility)|mint mobile)'
    category: 'Bills:Phone'
    priority: 100
  - pattern: '(?i)(rent)'
    category: 'Bills:Housing'
    priority: 95
  - pattern: '(?i)(hoa|homeowners association)'
    category: 'Bills:HOA'
    priority: 95
  - pattern: '(?i)(property tax|county tax collector)'
    category: 'Bills:Property Tax'
    priority: 95

  # ---------- Housing & Home ----------
  - pattern: '(?i)(plumber|plumbing|electrician|hvac|heating and cooling)'
    category: 'Home:Maintenance'
    priority: 90
  - pattern: '(?i)(landscaping|lawn care|trugreen|yard service)'
    category: 'Home:Lawn Care'
    priority: 85
  - pattern: '(?i)(home depot|lowe''s|ace hardware|home improvement|furniture|ikea)'
